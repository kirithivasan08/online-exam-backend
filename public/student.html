<!DOCTYPE html>
<html>

<head>
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700&display=swap"
        rel="stylesheet">
    <script src="theme.js"></script>
</head>

<body class="bg-gray-50 theme-student">

    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">Online Exam System</div>
            <div class="nav-links items-center">
                <label class="toggle-switch">
                    <input type="checkbox" class="toggle-input theme-toggle-input">
                    <span class="toggle-slider"></span>
                    <span class="toggle-label text-sm">Dark Mode</span>
                </label>
                <a href="history.html">My History</a>
                <a href="#" onclick="logout()">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="flex justify-between items-start mb-6 border-b pb-4 dark:border-zinc-700">
            <div>
                <h2 class="m-0 text-2xl flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="text-violet-500">
                        <path d="M12 2v20"></path>
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                    </svg>
                    Student Dashboard
                </h2>
                <p class="text-sm text-muted mt-1">Select an exam to begin an attempt.</p>
            </div>
            <button class="btn btn-secondary btn-sm" onclick="window.location.href='result.html'">View My
                Results</button>
        </div>

        <div id="examList" class="exam-grid">
            <!-- Exams will be loaded here -->
        </div>
    </div>

    <script>
        // Check login status
        const studentId = localStorage.getItem("studentId");
        if (!studentId) {
            window.location.href = "login.html";
        }

        async function loadExams() {
            try {
                const res = await fetch(`/api/exam/all?studentId=${studentId}`);
                const exams = await res.json();

                const list = document.getElementById("examList");
                list.innerHTML = "";

                if (exams.length === 0) {
                    list.innerHTML = "<p class='text-muted'>No exams available at the moment.</p>";
                    return;
                }

                exams.forEach(exam => {
                    const div = document.createElement("div");
                    div.className = "card flex flex-col justify-between";
                    div.innerHTML = `
                        <div>
                            <div class="flex justify-between items-start mb-4">
                                <h3 class="m-0 text-lg mb-1">${exam.title}</h3>
                                <span class="badge badge-blue text-xs">${exam.subject}</span>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-2 mb-6">
                                <div class="exam-meta-box">
                                    <span class="text-xs text-muted mb-1">Duration</span>
                                    <span class="font-bold text-sm flex items-center gap-1">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                                        ${exam.duration}m
                                    </span>
                                </div>
                                <div class="exam-meta-box">
                                    <span class="text-xs text-muted mb-1">Questions</span>
                                    <span class="font-bold text-sm flex items-center gap-1">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                                        ${exam.questions.length || 0}
                                    </span>
                                </div>
                            </div>
                        </div>
                        <button class="btn btn-primary w-full mt-auto" onclick="startExam('${exam._id}')">Attempt Exam</button>
                    `;
                    list.appendChild(div);
                });
            } catch (err) {
                console.error("Error loading exams:", err);
            }
        }

        function startExam(examId) {
            window.location.href = `attempt.html?examId=${examId}`;
        }

        function logout() {
            localStorage.removeItem("studentId");
            window.location.href = "login.html";
        }

        loadExams();
    </script>
</body>

</html>
