<!DOCTYPE html>
<html>

<head>
    <title>Student Register</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700&display=swap"
        rel="stylesheet">
    <script src="theme.js"></script>
</head>

<body class="theme-student">
    <div style="position: absolute; top: 1rem; right: 2rem;">
        <label class="toggle-switch">
            <input type="checkbox" class="toggle-input theme-toggle-input">
            <span class="toggle-slider"></span>
            <span class="toggle-label text-sm" style="color: var(--text)">Dark Mode</span>
        </label>
    </div>

    <div class="auth-container">
        <div class="card">
            <h2 class="text-center mb-4">Student Registration</h2>

            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label class="form-label">Roll Number</label>
                <input type="text" id="roll" placeholder="Enter your roll number">
            </div>

            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>

            <div class="form-group grid grid-cols-2 gap-4">
                <div>
                    <label class="form-label">Department</label>
                    <select id="department" class="form-input"
                        style="width: 100%; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.75rem 1rem; color: var(--text); background: var(--surface);">
                        <option value="">Select Dept</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Information Technology">Information Technology</option>
                        <option value="Mechanical Engineering">Mechanical Engineering</option>
                        <option value="Electrical Engineering">Electrical Engineering</option>
                        <option value="Civil Engineering">Civil Engineering</option>
                        <option value="Commerce">Commerce</option>
                        <option value="Arts & Science">Arts & Science</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">Year of Study</label>
                    <select id="year" class="form-input"
                        style="width: 100%; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.75rem 1rem; color: var(--text); background: var(--surface);">
                        <option value="">Select Year</option>
                        <option value="1st Year">1st Year</option>
                        <option value="2nd Year">2nd Year</option>
                        <option value="3rd Year">3rd Year</option>
                        <option value="4th Year">4th Year</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="password" placeholder="Create a password">
            </div>

            <button class="btn btn-primary" style="width: 100%" onclick="register()">Register</button>

            <div class="text-center mt-4">
                <a href="login.html">Already have an account? Login</a>
            </div>

            <div id="msg" class="alert mt-4"></div>
        </div>
    </div>

    <script>
        async function register() {
            const name = document.getElementById("name").value;
            const rollNumber = document.getElementById("roll").value;
            const email = document.getElementById("email").value;
            const department = document.getElementById("department").value;
            const year = document.getElementById("year").value;
            const password = document.getElementById("password").value;
            const btn = document.querySelector("button");

            if (!name || !rollNumber || !email || !department || !year || !password) {
                showMessage("Please fill in all fields including Department and Year", "error");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Registering...";
            document.getElementById("msg").style.display = "none";

            try {
                console.log("Sending registration request...");
                const res = await fetch("/api/student/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, rollNumber, email, department, year, password })
                });

                console.log("Response status:", res.status);
                const data = await res.json();
                console.log("Response data:", data);

                if (res.ok) {
                    showMessage(data.message, "success");
                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 1500);
                } else {
                    showMessage(data.message || data.error, "error");
                    btn.disabled = false;
                    btn.innerText = "Register";
                }
            } catch (err) {
                console.error("Registration failed:", err);
                showMessage("Network error: " + err.message, "error");
                btn.disabled = false;
                btn.innerText = "Register";
            }
        }

        function showMessage(text, type) {
            const msgDiv = document.getElementById("msg");
            msgDiv.className = `alert alert-${type} mt-4`;
            msgDiv.style.display = "block";
            msgDiv.innerText = text;
        }
    </script>
</body>

</html>
