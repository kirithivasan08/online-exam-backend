<!DOCTYPE html>
<html>

<head>
    <title>Exam History</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700&display=swap"
        rel="stylesheet">
    <script src="theme.js"></script>
</head>

<body class="bg-gray-50 theme-student">

    <nav class="navbar">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; margin-top: 0; margin-bottom: 0;">
            <div class="nav-brand" style="font-family: 'Plus Jakarta Sans', sans-serif;">Student Portal</div>
            <div class="nav-links items-center">
                <a href="student.html" class="font-medium hover:text-primary transition-colors">Dashboard</a>
                <a href="profile.html" class="font-medium hover:text-primary transition-colors">My Profile</a>
                <label class="toggle-switch m-0" style="margin-top: 0; margin-bottom: 0;">
                    <input type="checkbox" class="toggle-input theme-toggle-input">
                    <span class="toggle-slider"></span>
                </label>
                <button onclick="logout()" class="btn btn-ghost text-sm font-semibold">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container py-8">
        <div class="max-w-5xl mx-auto">
            <div class="flex justify-between items-end mb-10 pb-6 border-b dark:border-zinc-700">
                <div>
                    <h1 class="m-0 text-3xl font-extrabold flex items-center gap-3" style="font-family: 'Plus Jakarta Sans', sans-serif;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-violet-500"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14.5 2 14.5 8 20 8"></polyline><path d="M12 18v-4"></path><path d="M8 18v-2"></path><path d="M16 18v-6"></path></svg>
                        Exam History
                    </h1>
                    <p class="text-sm text-muted mt-2">A record of all your past attempts and performance data.</p>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left" style="border-collapse: collapse;">
                    <thead>
                        <tr class="border-b">
                            <th class="p-3">Exam</th>
                            <th class="p-3">Subject</th>
                            <th class="p-3">Date</th>
                            <th class="p-3 text-right">Score</th>
                            <th class="p-3 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody id="historyList">
                        <!-- Rows loaded here -->
                    </tbody>
                </table>
            </div>

            <div id="loading" class="text-center p-4">Loading history...</div>
            <div id="noData" class="text-center p-4 text-muted" style="display:none">No exam attempts found.</div>
        </div>
    </div>

    <script>
        const studentId = localStorage.getItem("studentId");
        if (!studentId) window.location.href = "login.html";

        function logout() {
            localStorage.removeItem("studentId");
            window.location.href = "index.html";
        }

        async function loadHistory() {
            try {
                const res = await fetch(`/api/attempt/result/${studentId}`);
                const data = await res.json();

                document.getElementById("loading").style.display = "none";
                const tbody = document.getElementById("historyList");

                if (!data.length) {
                    document.getElementById("noData").style.display = "block";
                    return;
                }

                // Sort by most recent
                data.reverse().forEach(attempt => {
                    const tr = document.createElement("tr");
                    tr.className = "border-b hover:bg-gray-50";

                    const score = attempt.marksObtained;
                    const total = attempt.examId.totalMarks || attempt.answers.length;

                    // Pass/Fail Logic
                    let passThreshold = attempt.examId.passMarks;
                    if (!passThreshold || passThreshold === 0) {
                        passThreshold = Math.ceil(total * 0.4);
                    }
                    const passed = score >= passThreshold;

                    // Date Formatting
                    const date = new Date(attempt.createdAt || Date.now()).toLocaleDateString();

                    tr.innerHTML = `
                        <td class="p-3 font-medium">${attempt.examId.title}</td>
                        <td class="p-3 text-muted">${attempt.examId.subject}</td>
                        <td class="p-3 text-muted">${date}</td>
                        <td class="p-3 text-right font-bold">${score} / ${total}</td>
                        <td class="p-3 text-center">
                            <span class="badge ${passed ? 'badge-green' : 'badge-red'} text-xs">
                                ${passed ? 'PASSED' : 'FAILED'}
                            </span>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (err) {
                console.error(err);
                document.getElementById("loading").innerText = "Error loading history.";
            }
        }

        loadHistory();
    </script>

    <style>
        .badge-green {
            background: #dcfce7;
            color: #166534;
        }

        .badge-red {
            background: #fee2e2;
            color: #991b1b;
        }

        .overflow-x-auto {
            overflow-x: auto;
        }

        .border-b {
            border-bottom: 1px solid var(--border);
        }

        .hover\:bg-gray-50:hover {
            background-color: #f9fafb;
        }
    </style>
</body>

</html>
