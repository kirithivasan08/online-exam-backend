<!DOCTYPE html>
<html>

<head>
    <title>Student Login</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700&display=swap"
        rel="stylesheet">
    <script src="theme.js"></script>
</head>

<body class="theme-student">
    <div style="position: absolute; top: 1rem; right: 2rem;">
        <label class="toggle-switch">
            <input type="checkbox" class="toggle-input theme-toggle-input">
            <span class="toggle-slider"></span>
            <span class="toggle-label text-sm" style="color: var(--text)">Dark Mode</span>
        </label>
    </div>

    <div class="auth-container">
        <div class="card">
            <h2 class="text-center mb-4">Student Login</h2>

            <div class="form-group">
                <label class="form-label">Roll Number</label>
                <input type="text" id="rollNumber" placeholder="Enter your roll number" />
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="password" placeholder="Enter your password" />
            </div>

            <button class="btn btn-primary" style="width: 100%" onclick="login()">Login</button>

            <div class="text-center mt-4">
                <a href="register.html">Don't have an account? Register</a>
            </div>

            <div id="msg" class="alert mt-4"></div>
        </div>
    </div>

    <script>
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('verified') === 'true') {
                const msgDiv = document.getElementById("msg");
                msgDiv.className = "alert mt-4";
                msgDiv.style.backgroundColor = "rgba(16, 185, 129, 0.1)";
                msgDiv.style.color = "#10b981";
                msgDiv.style.border = "1px solid #10b981";
                msgDiv.style.display = "block";
                msgDiv.innerText = "Email verified successfully! You can now log in.";
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        };

        async function login() {
            const rollNumber = document.getElementById("rollNumber").value;
            const password = document.getElementById("password").value;
            const msgDiv = document.getElementById("msg");

            if (!rollNumber || !password) {
                showError("Please fill in all fields");
                return;
            }

            try {
                const res = await fetch("/api/student/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ rollNumber, password })
                });

                const data = await res.json();

                if (res.ok && data.studentId) {
                    localStorage.setItem("studentId", data.studentId);
                    localStorage.setItem("studentName", data.name);
                    localStorage.setItem("rollNumber", data.rollNumber);
                    window.location.href = "student.html";
                } else {
                    showError(data.message || "Login failed");
                }
            } catch (err) {
                showError("Network error. Please try again.");
            }
        }

        function showError(message) {
            const msgDiv = document.getElementById("msg");
            msgDiv.className = "alert alert-error mt-4";
            msgDiv.style.backgroundColor = "rgba(239, 68, 68, 0.1)";
            msgDiv.style.color = "#ef4444";
            msgDiv.style.border = "1px solid #ef4444";
            msgDiv.style.display = "block";
            msgDiv.innerText = message;
        }
    </script>
</body>

</html>
